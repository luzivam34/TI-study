<!DOCTYPE html><!-- Tag que informa ao navegador que o documento e HTML5 -->
<html lang="pt-BR">

<head>
    <!-- Incio da Tag head a onde é colocado os meta dados -->
    <meta charset="UTF-8"><!-- Esta linha vai resolver problemas como caracteres e acentuação -->

    <title>Home</title><!-- Título da página -->

</head>

<body>
    <!-- Inicio da tag body a onde fica todo o conteudo visivel da página-->
    <header>
        <!--inicio da Tag header, Tag que vai acomodar o cabeçario, o logotipo e  tag navegação -->
        <h1>TI Study</h1><!-- Tag do Cabeçario nivel 1 -->

    </header>
    <main>
        <!-- Inicio da Tag main, para acomodar o conteudo principal -->
        <p>Aprendendo TI</p><!-- Tag usada para Paragráfo -->

    </main>
    <footer>
        <!-- inicio da Tag Footer, o rodapé da página -->
        <h4>&copy; TI Study 2026</h4>
    </footer>
</body>

</html>
