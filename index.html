<!DOCTYPE html><!-- Tag que informa ao navegador que o documento e HTML5 -->
<html lang="pt-BR">
<!-- início da tag html, contém lang com o idioma da página -->

<head>
    <!-- Início da Tag head, onde é colocado os meta dados -->

    <meta charset="UTF-8"><!-- Esta linha vai resolver problemas como caracteres e acentuação -->

    <title>Home</title><!-- Título da página -->

</head>

<body>
    <!-- Início da tag body a onde fica todo o conteudo visivel da página-->
    <header>
        <!--inicio da Tag header, Tag que vai acomodar o cabeçalho, o logotipo e  tag navegação -->
        <h1>TI Study</h1><!-- Tag do Cabeçalho nivel 1 -->
        <nav>
            <!-- Início da teg de navegação -->
            <ul>
                <!-- Início da Tag que organiza um conteúdo em lista -->
                <li><a href="/chatgpt.html">ChatGPT</a></li>
            </ul>

        </nav>
    </header>
    <main>
        <!-- Início da Tag main, para acomodar o conteúdo principal -->
        <section>
            <!--Início da tag section dividindo a main  em sessões -->
            <h2>Tecnologia da Informação</h2><!-- tag cabeçalho nivel 2 -->
            <p>Aprendendo TI</p><!-- Tag usada para Parágrafo -->

        </section>

    </main>
    <footer>
        <!-- inicio da Tag Footer, o rodapé da página -->
        <p>&copy; TI Study 2026</p>
    </footer>
</body>

</html>
